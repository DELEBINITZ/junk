<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Security Intelligence Chat</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 10px 16px; border-bottom: 1px solid #8884; display: flex; gap: 8px; align-items: center; }
    header input { padding: 6px; }
    #log { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin: 10px 0; padding: 10px 12px; border-radius: 8px; max-width: 760px; white-space: pre-wrap; }
    .user { background: #4a90d922; margin-left: auto; }
    .assistant { background: #8881; }
    .status { color: #888; font-size: 12px; margin: 4px 0; }
    .tool { font-size: 12px; color: #c70; background: #c7700f15; padding: 4px 8px; border-radius: 6px; display: inline-block; }
    .cites { font-size: 12px; color: #2a7; margin-top: 6px; }
    footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8884; }
    footer input { flex: 1; padding: 10px; }
    button { padding: 8px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <strong>Security Intelligence Chat</strong>
    <input id="api" placeholder="API base" value="http://localhost:8000" size="22" />
    <input id="email" placeholder="email" value="bob@techcorp.com" />
    <input id="password" type="password" placeholder="password" value="password123" />
    <button id="login">Login</button>
    <span id="who" class="status"></span>
  </header>
  <div id="log"></div>
  <footer>
    <input id="q" placeholder="Ask about your reports…" autocomplete="off" />
    <button id="send" disabled>Send</button>
  </footer>

  <script>
    const $ = (id) => document.getElementById(id);
    let token = null;
    let sessionId = null;
    const apiBase = () => $("api").value.replace(/\/$/, "");

    function add(cls, text) {
      const el = document.createElement("div");
      el.className = "msg " + cls;
      el.textContent = text;
      $("log").appendChild(el);
      $("log").scrollTop = $("log").scrollHeight;
      return el;
    }
    function note(text) {
      const el = document.createElement("div");
      el.className = "status";
      el.textContent = text;
      $("log").appendChild(el);
      $("log").scrollTop = $("log").scrollHeight;
    }

    $("login").onclick = async () => {
      const res = await fetch(apiBase() + "/auth/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: $("email").value, password: $("password").value }),
      });
      if (!res.ok) { $("who").textContent = "login failed"; return; }
      const data = await res.json();
      token = data.access_token;
      $("who").textContent = `${data.user.email} · ${data.user.role} · ${data.user.organization_id}`;
      $("send").disabled = false;
    };

    async function send() {
      const q = $("q").value.trim();
      if (!q || !token) return;
      add("user", q);
      $("q").value = "";
      const bubble = add("assistant", "");
      const cites = [];

      const res = await fetch(apiBase() + "/agent/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body: JSON.stringify({ message: q, session_id: sessionId }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop();
        for (const block of events) {
          let event = "message", data = "";
          for (const line of block.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) data += line.slice(5).trim();
          }
          if (!data) continue;
          const payload = JSON.parse(data);
          if (event === "status") note("• " + (payload.phase || "") + (payload.modules ? " → " + payload.modules.join(", ") : ""));
          else if (event === "tool_call") note("🔧 " + payload.tool);
          else if (event === "token") bubble.textContent += payload.text;
          else if (event === "citation") cites.push(payload.marker);
          else if (event === "done") {
            sessionId = payload.session_id || sessionId;
            if (cites.length) {
              const c = document.createElement("div");
              c.className = "cites"; c.textContent = "Sources: " + cites.join("  ");
              bubble.appendChild(c);
            }
          }
        }
      }
    }

    $("send").onclick = send;
    $("q").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  </script>
</body>
</html>
