<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Security Intelligence — Chat</title>
<!-- Markdown (marked) + sanitization (DOMPurify) + code highlighting (highlight.js) from CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" />
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<style>
  :root {
    --bg:#0b0e14; --panel:#11151d; --panel2:#171c26; --panel3:#1d2430;
    --line:#222a36; --line2:#2c3645;
    --text:#e8eef6; --muted:#9aa4b2; --faint:#6b7480;
    --accent:#4c8dff; --accent2:#7a6cff; --user:#2563eb;
    --code-bg:#0a0d13; --ok:#3fb950; --warn:#e3b341;
    --shadow:0 6px 24px rgba(0,0,0,.35); --shadow-sm:0 2px 8px rgba(0,0,0,.25);
    --radius:14px;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; display:flex; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:radial-gradient(1200px 600px at 70% -10%, #131a26 0%, var(--bg) 60%); color:var(--text);
         -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:var(--line2); border-radius:8px; border:2px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:#3a4658; background-clip:padding-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  /* ---------- sidebar ---------- */
  #sidebar { width:286px; background:rgba(17,21,29,.7); backdrop-filter:blur(8px);
             border-right:1px solid var(--line); display:flex; flex-direction:column; }
  #sidebar header { padding:16px 18px; border-bottom:1px solid var(--line); font-weight:650;
                    display:flex; justify-content:space-between; align-items:center; letter-spacing:.2px; }
  .brand { display:flex; align-items:center; gap:9px; font-size:14px; }
  .brand .dot { width:22px; height:22px; border-radius:7px; background:linear-gradient(135deg,var(--accent),var(--accent2));
                display:grid; place-items:center; font-size:12px; box-shadow:0 0 0 1px rgba(255,255,255,.06) inset; }
  #newchat { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:0; border-radius:8px;
             padding:7px 12px; cursor:pointer; font-size:13px; font-weight:600; box-shadow:var(--shadow-sm);
             transition:transform .12s ease, filter .12s ease; }
  #newchat:hover { transform:translateY(-1px); filter:brightness(1.08); }
  #newchat:active { transform:translateY(0); }
  #sessions { overflow-y:auto; flex:1; padding:8px; }
  .sess { padding:11px 13px; margin:2px 0; border-radius:9px; cursor:pointer; font-size:13px; color:var(--muted);
          white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background .12s ease, color .12s ease; }
  .sess:hover { background:var(--panel2); color:var(--text); }
  .sess.active { background:linear-gradient(90deg, rgba(76,141,255,.16), rgba(122,108,255,.06)); color:var(--text);
                 box-shadow:inset 3px 0 0 var(--accent); }

  /* ---------- main ---------- */
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #topbar { padding:12px 22px; border-bottom:1px solid var(--line); font-size:12.5px; color:var(--muted);
            display:flex; align-items:center; gap:8px; background:rgba(11,14,20,.5); }
  #topbar .chip { background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:3px 10px; color:var(--muted); }
  #messages { flex:1; overflow-y:auto; padding:28px 18px 8px; scroll-behavior:smooth; }

  /* ---------- a chat turn ---------- */
  .turn { max-width:860px; margin:0 auto 26px; display:flex; gap:14px; align-items:flex-start;
          animation:rise .26s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .turn.user { flex-direction:row-reverse; }
  .avatar { flex:0 0 32px; width:32px; height:32px; border-radius:9px; display:grid; place-items:center;
            font-size:15px; margin-top:2px; box-shadow:var(--shadow-sm); user-select:none; }
  .turn.assistant .avatar { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
  .turn.user .avatar { background:var(--panel3); color:var(--text); border:1px solid var(--line2); }
  .content { min-width:0; flex:1; display:flex; flex-direction:column; }
  .turn.user .content { align-items:flex-end; }
  .role { font-size:11.5px; color:var(--faint); margin:0 4px 6px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; }

  .bubble { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:15px 18px;
            line-height:1.62; word-wrap:break-word; max-width:100%; box-shadow:var(--shadow-sm);
            border-top-left-radius:4px; }
  .turn.user .bubble { background:linear-gradient(135deg,var(--user),#3b76f0); border-color:transparent; color:#fff;
                       border-top-left-radius:var(--radius); border-top-right-radius:4px; }

  /* ---------- markdown rhythm ---------- */
  .bubble > :first-child { margin-top:0; } .bubble > :last-child { margin-bottom:0; }
  .bubble p { margin:0 0 11px; }
  .bubble h1,.bubble h2,.bubble h3,.bubble h4 { margin:20px 0 10px; line-height:1.3; font-weight:650; }
  .bubble h1 { font-size:1.4em; } .bubble h2 { font-size:1.22em; border-bottom:1px solid var(--line); padding-bottom:5px; }
  .bubble h3 { font-size:1.08em; } .bubble h4 { font-size:1em; color:var(--muted); }
  .bubble ul,.bubble ol { margin:0 0 11px; padding-left:22px; }
  .bubble li { margin:4px 0; } .bubble li::marker { color:var(--accent); }
  .bubble a { color:#79b0ff; text-decoration:none; border-bottom:1px solid rgba(121,176,255,.3); transition:border-color .12s; }
  .bubble a:hover { border-bottom-color:#79b0ff; }
  .bubble hr { border:0; border-top:1px solid var(--line); margin:16px 0; }
  .bubble strong { color:#fff; font-weight:650; } .turn.user .bubble strong { color:#fff; }
  .bubble blockquote { margin:0 0 11px; padding:6px 14px; border-left:3px solid var(--accent);
                       background:rgba(76,141,255,.07); border-radius:0 8px 8px 0; color:var(--muted); }
  .bubble blockquote p:last-child { margin-bottom:0; }

  /* inline code */
  .bubble code { background:var(--code-bg); padding:2px 6px; border-radius:5px; font-size:.88em;
                 font-family:"SF Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; border:1px solid var(--line);
                 color:#e9b8ff; }
  .turn.user .bubble code { background:rgba(0,0,0,.22); border-color:rgba(255,255,255,.14); color:#fff; }

  /* ---------- code blocks (wrapped w/ header bar) ---------- */
  .code-wrap { margin:0 0 12px; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--code-bg);
               box-shadow:var(--shadow-sm); }
  .code-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 12px;
              background:var(--panel2); border-bottom:1px solid var(--line); }
  .code-lang { font-size:11px; color:var(--faint); font-family:ui-monospace,monospace; letter-spacing:.5px; text-transform:lowercase; }
  .code-copy { background:transparent; color:var(--muted); border:1px solid var(--line2); border-radius:6px;
               padding:3px 10px; font-size:11px; cursor:pointer; transition:all .12s ease; }
  .code-copy:hover { color:var(--text); border-color:var(--accent); background:rgba(76,141,255,.1); }
  .code-copy.done { color:var(--ok); border-color:var(--ok); }
  .code-wrap pre { margin:0; padding:14px; overflow-x:auto; background:transparent; }
  .bubble pre { margin:0 0 12px; padding:14px; background:var(--code-bg); border:1px solid var(--line); border-radius:10px; overflow-x:auto; }
  .bubble pre code { background:transparent; border:0; padding:0; font-size:.85em; color:inherit; line-height:1.55; }

  /* ---------- tables ---------- */
  .bubble table { border-collapse:collapse; margin:0 0 12px; width:100%; font-size:.92em; overflow:hidden; border-radius:8px; }
  .bubble th,.bubble td { border:1px solid var(--line); padding:7px 11px; text-align:left; }
  .bubble thead th { background:var(--panel2); color:var(--text); font-weight:600; }
  .bubble tbody tr:nth-child(even) { background:rgba(255,255,255,.02); }

  /* ---------- citations ---------- */
  .cites { margin-top:13px; padding-top:11px; border-top:1px dashed var(--line); display:flex; flex-wrap:wrap; gap:7px; }
  .cite { font-size:11.5px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:4px 10px 4px 8px;
          color:var(--muted); cursor:help; display:inline-flex; align-items:center; gap:6px; transition:all .12s ease; }
  .cite:hover { border-color:var(--accent); color:var(--text); }
  .cite .n { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:10px; font-weight:700;
             min-width:16px; height:16px; border-radius:5px; display:grid; place-items:center; padding:0 3px; }

  /* ---------- meta / feedback ---------- */
  .meta { margin-top:11px; display:flex; gap:6px; align-items:center; }
  .mbtn { cursor:pointer; opacity:.55; background:transparent; border:1px solid transparent; border-radius:7px;
          padding:3px 7px; font-size:14px; line-height:1; transition:all .12s ease; color:var(--muted); }
  .mbtn:hover { opacity:1; background:var(--panel2); border-color:var(--line); }
  .mbtn.on { opacity:1; background:rgba(76,141,255,.14); border-color:var(--accent); }
  .mbtn.copy { font-size:12px; }

  /* ---------- thinking panel (visible reasoning) ---------- */
  .think { margin:2px 4px 10px; border-left:2px solid var(--line2); background:rgba(122,108,255,.05);
           border-radius:0 8px 8px 0; font-size:12.5px; overflow:hidden; }
  .think > summary { cursor:pointer; list-style:none; padding:7px 12px; color:var(--muted);
                     display:flex; align-items:center; gap:8px; user-select:none; font-weight:600; letter-spacing:.2px; }
  .think > summary::-webkit-details-marker { display:none; }
  .think > summary::after { content:"▸"; color:var(--faint); font-size:10px; margin-left:auto; transition:transform .15s; }
  .think[open] > summary::after { transform:rotate(90deg); }
  .think-dot { width:7px; height:7px; border-radius:50%; background:var(--accent2);
               box-shadow:0 0 8px var(--accent2); animation:pulse 1.1s ease-in-out infinite; flex:0 0 auto; }
  .think-dot.done { animation:none; opacity:.45; box-shadow:none; }
  .think-body { padding:0 14px 10px; color:var(--muted); line-height:1.55; }
  .tline { padding:6px 0; border-top:1px dashed var(--line); white-space:pre-wrap; }
  .tline:first-child { border-top:0; }
  .tstage { display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:.5px; vertical-align:1px;
            color:var(--accent2); background:rgba(122,108,255,.12); border-radius:5px; padding:1px 6px; margin-right:8px; }

  /* ---------- status + typing + caret ---------- */
  .status { font-size:12px; color:var(--accent); margin:8px 4px 0; min-height:16px; display:flex; align-items:center; gap:7px; }
  .status:not(:empty)::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--accent);
                                box-shadow:0 0 8px var(--accent); animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:.4; transform:scale(.8);} 50%{ opacity:1; transform:scale(1.2);} }
  .typing { display:inline-flex; gap:5px; padding:3px 2px; }
  .typing i { width:7px; height:7px; border-radius:50%; background:var(--muted); display:inline-block; animation:bounce 1.2s infinite ease-in-out; }
  .typing i:nth-child(2){ animation-delay:.18s; } .typing i:nth-child(3){ animation-delay:.36s; }
  @keyframes bounce { 0%,80%,100%{ transform:translateY(0); opacity:.5;} 40%{ transform:translateY(-5px); opacity:1;} }
  .caret { display:inline-block; width:8px; height:1.05em; vertical-align:text-bottom; margin-left:2px; border-radius:2px;
           background:var(--accent); animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50%{ opacity:0; } }

  /* ---------- composer ---------- */
  #composer { border-top:1px solid var(--line); padding:16px 18px 20px; background:rgba(11,14,20,.6); }
  #composer .row { max-width:860px; margin:0 auto; display:flex; gap:10px; align-items:flex-end;
                   background:var(--panel); border:1px solid var(--line2); border-radius:14px; padding:8px 8px 8px 14px;
                   box-shadow:var(--shadow); transition:border-color .15s ease; }
  #composer .row:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px rgba(76,141,255,.12), var(--shadow); }
  #input { flex:1; resize:none; background:transparent; color:var(--text); border:0; outline:none;
           padding:8px 0; font-size:14.5px; font-family:inherit; max-height:180px; line-height:1.5; }
  #input::placeholder { color:var(--faint); }
  #send { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:0; border-radius:10px;
          padding:0 20px; height:40px; cursor:pointer; font-weight:650; font-size:14px; box-shadow:var(--shadow-sm);
          transition:transform .12s ease, filter .12s ease; }
  #send:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.08); }
  #send:disabled { opacity:.45; cursor:default; }
  .hint { max-width:860px; margin:8px auto 0; font-size:11px; color:var(--faint); text-align:center; }
</style>
</head>
<body>
  <aside id="sidebar">
    <header>
      <span class="brand"><span class="dot">✦</span><span>Conversations</span></span>
      <button id="newchat">+ New</button>
    </header>
    <div id="sessions"></div>
  </aside>
  <main id="main">
    <div id="topbar"></div>
    <div id="messages"></div>
    <div id="composer">
      <div class="row">
        <textarea id="input" rows="1" placeholder="Ask about your reports, attack surface, threats…  (Enter to send)"></textarea>
        <button id="send">Send</button>
      </div>
      <div class="hint">Enter to send · Shift+Enter for newline</div>
    </div>
  </main>

<script>
// ============================ CONFIG (hardcoded for testing) =================
// Run the API with AUTH_PROVIDER=apikey, then open this page at the app's "/" URL
// (e.g. http://localhost:8000/) so requests are same-origin (no CORS).
const CONFIG = {
  API_BASE: "",                        // same-origin; or "http://localhost:8000"
  API_KEY:  "dev-api-key-change-me",   // must be in settings.api_keys
  ORG_ID:   "org_acme",
  USER_ID:  "u-alice",
  ROLES:    "analyst",                 // comma-separated
};
// ============================================================================

marked.setOptions({ breaks:true, gfm:true });
const $ = (s) => document.querySelector(s);
const messagesEl = $("#messages"), sessionsEl = $("#sessions"), topbar = $("#topbar"), input = $("#input");
let currentSession = null, streaming = false;

const authHeaders = () => ({
  "X-API-Key": CONFIG.API_KEY, "X-Org-Id": CONFIG.ORG_ID,
  "X-User-Id": CONFIG.USER_ID, "X-Roles": CONFIG.ROLES,
});
const md = (t) => DOMPurify.sanitize(marked.parse(t || ""));
const escapeHtml = (s) => { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; };
const TYPING = `<span class="typing"><i></i><i></i><i></i></span>`;

function setTopbar() {
  topbar.innerHTML =
    `<span class="chip">org · ${escapeHtml(CONFIG.ORG_ID)}</span>` +
    `<span class="chip">user · ${escapeHtml(CONFIG.USER_ID)}</span>` +
    `<span class="chip">${currentSession ? "session " + escapeHtml(currentSession.slice(0, 12)) : "new conversation"}</span>`;
}

// ---- sessions sidebar ----
async function loadSessions() {
  try {
    const r = await fetch(`${CONFIG.API_BASE}/v1/sessions`, { headers: authHeaders() });
    if (!r.ok) return;
    const rows = await r.json();
    sessionsEl.innerHTML = "";
    rows.forEach((s) => {
      const d = document.createElement("div");
      d.className = "sess" + (s.id === currentSession ? " active" : "");
      d.textContent = s.title || "New chat";
      d.title = s.title || "";
      d.onclick = () => openSession(s.id);
      sessionsEl.appendChild(d);
    });
  } catch (e) { console.error(e); }
}

function newChat() { currentSession = null; messagesEl.innerHTML = ""; setTopbar(); loadSessions(); input.focus(); }

// ---- render one turn (avatar + content; typing dots for an empty assistant bubble) ----
function addTurn(role, html) {
  const turn = document.createElement("div");
  turn.className = "turn " + role;
  const avatar = role === "user" ? "🧑" : "✦";
  const label = role === "user" ? "You" : "Assistant";
  const body = (role !== "user" && html === "") ? TYPING : html;
  turn.innerHTML =
    `<div class="avatar">${avatar}</div>` +
    `<div class="content">` +
      `<div class="role">${label}</div>` +
      `<details class="think" style="display:none"><summary>` +
        `<span class="think-dot"></span><span class="think-label">Thinking…</span></summary>` +
        `<div class="think-body"></div></details>` +
      `<div class="bubble">${body}</div>` +
      `<div class="status"></div>` +
    `</div>`;
  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return turn;
}

// ---- post-render: syntax-highlight code + add a header bar (language label + copy) ----
function enhance(bubble) {
  bubble.querySelectorAll("pre code").forEach((code) => {
    const pre = code.parentElement;
    if (!pre || pre.dataset.enhanced) return;
    pre.dataset.enhanced = "1";
    try { window.hljs && hljs.highlightElement(code); } catch (_) {}
    const lang = (code.className.match(/language-([\w-]+)/) || [])[1] || "code";
    const wrap = document.createElement("div"); wrap.className = "code-wrap";
    const bar = document.createElement("div"); bar.className = "code-bar";
    const tag = document.createElement("span"); tag.className = "code-lang"; tag.textContent = lang;
    const btn = document.createElement("button"); btn.className = "code-copy"; btn.textContent = "Copy";
    btn.onclick = () => {
      navigator.clipboard.writeText(code.textContent).then(() => {
        btn.textContent = "Copied"; btn.classList.add("done");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("done"); }, 1300);
      });
    };
    bar.append(tag, btn);
    pre.parentNode.insertBefore(wrap, pre);
    wrap.append(bar, pre);
  });
}
// ---- trailing blink caret while streaming ----
function addCaret(bubble) {
  const c = document.createElement("span"); c.className = "caret";
  bubble.appendChild(c);
}
// ---- visible reasoning ("thinking") panel ----
function addThinking(turn, stage, text) {
  const panel = turn.querySelector(".think");
  if (!panel) return;
  panel.style.display = "";          // reveal on first thinking event
  panel.open = true;                  // expanded while the turn runs
  const body = panel.querySelector(".think-body");
  const line = document.createElement("div");
  line.className = "tline";
  line.innerHTML = `<span class="tstage">${escapeHtml(stage || "")}</span>` +
                   escapeHtml(text || "").replace(/\n/g, "<br>");
  body.appendChild(line);
}
function finishThinking(turn) {
  const panel = turn.querySelector(".think");
  if (!panel || panel.style.display === "none") return;
  panel.open = false;                 // collapse once the answer is done (ChatGPT-style)
  const lbl = panel.querySelector(".think-label"); if (lbl) lbl.textContent = "Thought process";
  const dot = panel.querySelector(".think-dot");   if (dot) dot.classList.add("done");
}

function citeRow(cites) {
  const wrap = document.createElement("div"); wrap.className = "cites";
  cites.forEach((c) => {
    const el = document.createElement("span"); el.className = "cite";
    const badge = document.createElement("span"); badge.className = "n"; badge.textContent = c.n ?? "•";
    const lbl = document.createElement("span"); lbl.textContent = c.title || c.source || c.doc_id || "source";
    el.append(badge, lbl);
    el.title = c.snippet || "";
    wrap.appendChild(el);
  });
  return wrap;
}
function metaRow(messageId, feedback, text) {
  const m = document.createElement("div"); m.className = "meta";
  if (messageId) {
    const up = document.createElement("button"), down = document.createElement("button");
    up.className = "mbtn" + (feedback === 1 ? " on" : ""); up.textContent = "👍"; up.title = "Helpful";
    down.className = "mbtn" + (feedback === -1 ? " on" : ""); down.textContent = "👎"; down.title = "Not helpful";
    up.onclick = () => sendFeedback(messageId, 1, up, down);
    down.onclick = () => sendFeedback(messageId, -1, down, up);
    m.append(up, down);
  }
  const copy = document.createElement("button"); copy.className = "mbtn copy"; copy.textContent = "⧉ Copy"; copy.title = "Copy answer";
  copy.onclick = () => navigator.clipboard.writeText(text || "").then(() => {
    copy.textContent = "✓ Copied"; setTimeout(() => copy.textContent = "⧉ Copy", 1300);
  });
  m.append(copy);
  return m;
}
async function sendFeedback(id, value, onEl, offEl) {
  try {
    await fetch(`${CONFIG.API_BASE}/v1/messages/${id}/feedback`, {
      method: "POST", headers: { ...authHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify({ value }),
    });
    onEl.classList.add("on"); if (offEl) offEl.classList.remove("on");
  } catch (e) { console.error(e); }
}

// ---- load a stored conversation (renders markdown + highlight + citations + feedback) ----
async function openSession(id) {
  currentSession = id; setTopbar(); loadSessions();
  messagesEl.innerHTML = "";
  const r = await fetch(`${CONFIG.API_BASE}/v1/sessions/${id}`, { headers: authHeaders() });
  if (!r.ok) return;
  const data = await r.json();
  (data.messages || []).forEach((m) => {
    if (m.role === "user") { addTurn("user", escapeHtml(m.content)); return; }
    if (m.role !== "assistant") return;
    const turn = addTurn("assistant", md(m.content));
    const bubble = turn.querySelector(".bubble");
    enhance(bubble);
    if (m.citations && m.citations.length) bubble.appendChild(citeRow(m.citations));
    bubble.appendChild(metaRow(m.id, m.feedback || 0, m.content));
  });
}

// ---- send + STREAM the answer ----
function sendMessage() {
  const text = input.value.trim();
  if (!text || streaming) return;
  input.value = ""; input.style.height = "auto";
  addTurn("user", escapeHtml(text));

  const turn = addTurn("assistant", "");
  const bubble = turn.querySelector(".bubble"), statusEl = turn.querySelector(".status");
  let acc = "";
  streaming = true; $("#send").disabled = true;

  const qs = new URLSearchParams({
    api_key: CONFIG.API_KEY, org_id: CONFIG.ORG_ID, user_id: CONFIG.USER_ID,
    roles: CONFIG.ROLES, message: text,
  });
  if (currentSession) qs.set("session_id", currentSession);
  const es = new EventSource(`${CONFIG.API_BASE}/v1/chat/stream?${qs.toString()}`);

  es.addEventListener("session", (e) => { currentSession = JSON.parse(e.data).session_id; setTopbar(); });
  es.addEventListener("status", (e) => { statusEl.textContent = JSON.parse(e.data).stage || ""; });
  es.addEventListener("plan",   (e) => { statusEl.textContent = "planning (" + (JSON.parse(e.data).steps?.length || 0) + " steps)"; });
  es.addEventListener("route",  (e) => { statusEl.textContent = "routing → " + (JSON.parse(e.data).modules || []).join(", "); });
  es.addEventListener("thinking", (e) => { const d = JSON.parse(e.data); addThinking(turn, d.stage, d.text); messagesEl.scrollTop = messagesEl.scrollHeight; });
  es.addEventListener("tool",   (e) => { const d = JSON.parse(e.data); statusEl.textContent = "tool: " + (d.module || d.step || "") + (d.found != null ? " (" + d.found + ")" : ""); });
  es.addEventListener("token",  (e) => { acc += JSON.parse(e.data).text; bubble.innerHTML = md(acc); addCaret(bubble); messagesEl.scrollTop = messagesEl.scrollHeight; });
  es.addEventListener("done", (e) => {
    const d = JSON.parse(e.data);
    acc = d.answer || acc;
    bubble.innerHTML = md(acc);
    enhance(bubble);
    if (d.citations && d.citations.length) bubble.appendChild(citeRow(d.citations));
    bubble.appendChild(metaRow(d.message_id, 0, acc));
    statusEl.textContent = "";
    finishThinking(turn);
    finish(es); loadSessions();
  });
  es.addEventListener("error", (e) => {                // server "error" event OR transport drop
    try { statusEl.textContent = "⚠ " + (JSON.parse(e.data).message || "error"); } catch (_) { /* transport close */ }
    if (acc === "") bubble.innerHTML = "<em>(connection error — is the server running with AUTH_PROVIDER=apikey, and the API key correct?)</em>";
    finish(es);
  });
}
function finish(es) { es.close(); streaming = false; $("#send").disabled = false; input.focus(); }

// ---- wiring ----
$("#send").onclick = sendMessage;
$("#newchat").onclick = newChat;
input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 180) + "px"; });
setTopbar(); loadSessions(); input.focus();
</script>
</body>
</html>
