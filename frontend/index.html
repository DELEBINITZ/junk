<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Security Intelligence — Chat</title>
<!-- Markdown rendering (marked) + sanitization (DOMPurify) from CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root { --bg:#0e1116; --panel:#161b22; --panel2:#1c222b; --line:#272e38;
          --text:#e6edf3; --muted:#8b949e; --accent:#388bfd; --user:#1f6feb; }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--text); }
  #sidebar { width:280px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  #sidebar header { padding:14px 16px; border-bottom:1px solid var(--line); font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  #newchat { background:var(--accent); color:#fff; border:0; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; }
  #sessions { overflow-y:auto; flex:1; }
  .sess { padding:11px 16px; border-bottom:1px solid var(--line); cursor:pointer; font-size:13px; color:var(--muted);
          white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sess:hover { background:var(--panel2); }
  .sess.active { background:var(--panel2); color:var(--text); border-left:3px solid var(--accent); }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #topbar { padding:10px 18px; border-bottom:1px solid var(--line); font-size:13px; color:var(--muted); }
  #messages { flex:1; overflow-y:auto; padding:24px 18px; }
  .turn { max-width:820px; margin:0 auto 22px; }
  .role { font-size:12px; color:var(--muted); margin-bottom:5px; }
  .bubble { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:13px 16px; line-height:1.55; word-wrap:break-word; }
  .turn.user .bubble { background:var(--user); border-color:var(--user); color:#fff; }
  .bubble p:first-child { margin-top:0; } .bubble p:last-child { margin-bottom:0; }
  .bubble pre { background:#0b0f14; padding:10px; border-radius:6px; overflow-x:auto; }
  .bubble code { background:#0b0f14; padding:1px 5px; border-radius:4px; font-size:90%; }
  .bubble table { border-collapse:collapse; } .bubble th,.bubble td { border:1px solid var(--line); padding:4px 8px; }
  .cites { margin-top:9px; display:flex; flex-wrap:wrap; gap:6px; }
  .cite { font-size:11px; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:3px 9px; color:var(--muted); cursor:help; }
  .meta { margin-top:7px; display:flex; gap:10px; align-items:center; font-size:14px; color:var(--muted); }
  .fb { cursor:pointer; opacity:.5; } .fb:hover, .fb.on { opacity:1; }
  .status { font-size:12px; color:var(--accent); margin-top:6px; min-height:16px; }
  #composer { border-top:1px solid var(--line); padding:14px 18px; }
  #composer .row { max-width:820px; margin:0 auto; display:flex; gap:10px; }
  #input { flex:1; resize:none; background:var(--panel); color:var(--text); border:1px solid var(--line);
           border-radius:8px; padding:11px 13px; font-size:14px; font-family:inherit; max-height:160px; }
  #send { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:0 18px; cursor:pointer; font-weight:600; }
  #send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <aside id="sidebar">
    <header><span>Conversations</span><button id="newchat">+ New</button></header>
    <div id="sessions"></div>
  </aside>
  <main id="main">
    <div id="topbar"></div>
    <div id="messages"></div>
    <div id="composer">
      <div class="row">
        <textarea id="input" rows="1" placeholder="Ask about your reports, attack surface, threats…  (Enter to send)"></textarea>
        <button id="send">Send</button>
      </div>
    </div>
  </main>

<script>
// ============================ CONFIG (hardcoded for testing) =================
// Run the API with AUTH_PROVIDER=apikey, then open this page at the app's "/" URL
// (e.g. http://localhost:8000/) so requests are same-origin (no CORS).
const CONFIG = {
  API_BASE: "",                        // same-origin; or "http://localhost:8000"
  API_KEY:  "dev-api-key-change-me",   // must be in settings.api_keys
  ORG_ID:   "org_acme",
  USER_ID:  "u-alice",
  ROLES:    "analyst",                 // comma-separated
};
// ============================================================================

marked.setOptions({ breaks:true, gfm:true });
const $ = (s) => document.querySelector(s);
const messagesEl = $("#messages"), sessionsEl = $("#sessions"), topbar = $("#topbar"), input = $("#input");
let currentSession = null, streaming = false;

const authHeaders = () => ({
  "X-API-Key": CONFIG.API_KEY, "X-Org-Id": CONFIG.ORG_ID,
  "X-User-Id": CONFIG.USER_ID, "X-Roles": CONFIG.ROLES,
});
const md = (t) => DOMPurify.sanitize(marked.parse(t || ""));
const escapeHtml = (s) => { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; };

function setTopbar() {
  topbar.textContent = `org: ${CONFIG.ORG_ID}  ·  user: ${CONFIG.USER_ID}  ·  ` +
    (currentSession ? "session " + currentSession.slice(0, 16) : "new conversation");
}

// ---- sessions sidebar ----
async function loadSessions() {
  try {
    const r = await fetch(`${CONFIG.API_BASE}/v1/sessions`, { headers: authHeaders() });
    if (!r.ok) return;
    const rows = await r.json();
    sessionsEl.innerHTML = "";
    rows.forEach((s) => {
      const d = document.createElement("div");
      d.className = "sess" + (s.id === currentSession ? " active" : "");
      d.textContent = s.title || "New chat";
      d.title = s.title || "";
      d.onclick = () => openSession(s.id);
      sessionsEl.appendChild(d);
    });
  } catch (e) { console.error(e); }
}

function newChat() { currentSession = null; messagesEl.innerHTML = ""; setTopbar(); loadSessions(); input.focus(); }

// ---- render one turn ----
function addTurn(role, html) {
  const turn = document.createElement("div");
  turn.className = "turn " + role;
  turn.innerHTML = `<div class="role">${role === "user" ? "You" : "Assistant"}</div>` +
                   `<div class="bubble">${html}</div><div class="status"></div>`;
  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return turn;
}
function citeRow(cites) {
  const wrap = document.createElement("div"); wrap.className = "cites";
  cites.forEach((c) => {
    const el = document.createElement("span"); el.className = "cite";
    el.textContent = `[${c.n ?? "•"}] ${c.title || c.source || c.doc_id || "source"}`;
    el.title = c.snippet || "";
    wrap.appendChild(el);
  });
  return wrap;
}
function metaRow(messageId, feedback) {
  const m = document.createElement("div"); m.className = "meta";
  const up = document.createElement("span"), down = document.createElement("span");
  up.className = "fb" + (feedback === 1 ? " on" : ""); up.textContent = "👍";
  down.className = "fb" + (feedback === -1 ? " on" : ""); down.textContent = "👎";
  up.onclick = () => sendFeedback(messageId, 1, up, down);
  down.onclick = () => sendFeedback(messageId, -1, down, up);
  m.append(up, down);
  return m;
}
async function sendFeedback(id, value, onEl, offEl) {
  try {
    await fetch(`${CONFIG.API_BASE}/v1/messages/${id}/feedback`, {
      method: "POST", headers: { ...authHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify({ value }),
    });
    onEl.classList.add("on"); if (offEl) offEl.classList.remove("on");
  } catch (e) { console.error(e); }
}

// ---- load a stored conversation (renders markdown + citations + feedback) ----
async function openSession(id) {
  currentSession = id; setTopbar(); loadSessions();
  messagesEl.innerHTML = "";
  const r = await fetch(`${CONFIG.API_BASE}/v1/sessions/${id}`, { headers: authHeaders() });
  if (!r.ok) return;
  const data = await r.json();
  (data.messages || []).forEach((m) => {
    if (m.role === "user") { addTurn("user", escapeHtml(m.content)); return; }
    if (m.role !== "assistant") return;
    const turn = addTurn("assistant", md(m.content));
    const bubble = turn.querySelector(".bubble");
    if (m.citations && m.citations.length) bubble.appendChild(citeRow(m.citations));
    bubble.appendChild(metaRow(m.id, m.feedback || 0));
  });
}

// ---- send + STREAM the answer ----
function sendMessage() {
  const text = input.value.trim();
  if (!text || streaming) return;
  input.value = ""; input.style.height = "auto";
  addTurn("user", escapeHtml(text));

  const turn = addTurn("assistant", "");
  const bubble = turn.querySelector(".bubble"), statusEl = turn.querySelector(".status");
  let acc = "";
  streaming = true; $("#send").disabled = true;

  const qs = new URLSearchParams({
    api_key: CONFIG.API_KEY, org_id: CONFIG.ORG_ID, user_id: CONFIG.USER_ID,
    roles: CONFIG.ROLES, message: text,
  });
  if (currentSession) qs.set("session_id", currentSession);
  const es = new EventSource(`${CONFIG.API_BASE}/v1/chat/stream?${qs.toString()}`);

  es.addEventListener("session", (e) => { currentSession = JSON.parse(e.data).session_id; setTopbar(); });
  es.addEventListener("status", (e) => { statusEl.textContent = "• " + (JSON.parse(e.data).stage || ""); });
  es.addEventListener("plan",   (e) => { statusEl.textContent = "• planning (" + (JSON.parse(e.data).steps?.length || 0) + " steps)"; });
  es.addEventListener("route",  (e) => { statusEl.textContent = "• routing → " + (JSON.parse(e.data).modules || []).join(", "); });
  es.addEventListener("tool",   (e) => { const d = JSON.parse(e.data); statusEl.textContent = "• tool: " + (d.module || d.step || "") + (d.found != null ? " (" + d.found + ")" : ""); });
  es.addEventListener("token",  (e) => { acc += JSON.parse(e.data).text; bubble.innerHTML = md(acc); messagesEl.scrollTop = messagesEl.scrollHeight; });
  es.addEventListener("done", (e) => {
    const d = JSON.parse(e.data);
    acc = d.answer || acc;
    bubble.innerHTML = md(acc);
    if (d.citations && d.citations.length) bubble.appendChild(citeRow(d.citations));
    if (d.message_id) bubble.appendChild(metaRow(d.message_id, 0));
    statusEl.textContent = "";
    finish(es); loadSessions();
  });
  es.addEventListener("error", (e) => {                // server "error" event OR transport drop
    try { statusEl.textContent = "⚠ " + (JSON.parse(e.data).message || "error"); } catch (_) { /* transport close */ }
    if (acc === "") bubble.innerHTML = "<em>(connection error — is the server running with AUTH_PROVIDER=apikey, and the API key correct?)</em>";
    finish(es);
  });
}
function finish(es) { es.close(); streaming = false; $("#send").disabled = false; input.focus(); }

// ---- wiring ----
$("#send").onclick = sendMessage;
$("#newchat").onclick = newChat;
input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px"; });
setTopbar(); loadSessions(); input.focus();
</script>
</body>
</html>
