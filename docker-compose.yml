services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: contract-intelligence-frontend
    environment:
      API_BASE_URL: "http://api:8000"
      FRONTEND_PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract-intelligence-api
    environment:
      APP_NAME: "Enterprise Contract Intelligence PoC"
      JWT_SECRET: "demo-docker-secret-change-before-prod"
      JWT_ISSUER: "contract-intelligence-poc"
      ACCESS_TOKEN_MINUTES: "120"
      CONTRACT_CORPUS_DIR: "Assignment_org"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-hash}"
      EMBEDDING_DIMENSIONS: "${EMBEDDING_DIMENSIONS:-384}"
      LLM_PROVIDER: "${LLM_PROVIDER:-deterministic}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b-instruct}"
      VLLM_BASE_URL: "${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}"
      VLLM_MODEL: "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-json}"
      DATABASE_URL: "postgresql://contract_user:contract_pass@postgres:5432/contract_intelligence"
      STORE_BACKEND: "${STORE_BACKEND:-memory}"
      RLS_SETTING_NAME: "${RLS_SETTING_NAME:-app.organization_id}"
      RETRIEVAL_BACKEND: "${RETRIEVAL_BACKEND:-memory}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION:-reports_kb}"
      TEI_BASE_URL: "${TEI_BASE_URL:-http://tei:8080}"
      TEI_MODEL: "${TEI_MODEL:-Qwen/Qwen3-Embedding-8B}"
      SGLANG_BASE_URL: "${SGLANG_BASE_URL:-http://sglang:30000/v1}"
      SGLANG_MODEL_STANDARD: "${SGLANG_MODEL_STANDARD:-Qwen/Qwen2.5-72B-Instruct}"
      SGLANG_MODEL_FAST: "${SGLANG_MODEL_FAST:-Qwen/Qwen2.5-7B-Instruct}"
      SGLANG_MODEL_DEEP: "${SGLANG_MODEL_DEEP:-deepseek-ai/DeepSeek-V3.1}"
      TOPIC_SAFETY_PROVIDER: "${TOPIC_SAFETY_PROVIDER:-off}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-intelligence-postgres
    environment:
      POSTGRES_DB: contract_intelligence
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
    ports:
      - "5432:5432"
    volumes:
      - contract_intelligence_pgdata:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./app/core/db/migrations/0001_chat_audit.sql:/docker-entrypoint-initdb.d/002_chat_audit.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_user -d contract_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: contract-intelligence-ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - contract_intelligence_ollama:/root/.ollama
    restart: unless-stopped

  # Vector store for the Qdrant retrieval backend (RETRIEVAL_BACKEND=qdrant).
  # `docker compose --profile rag up` to start it alongside the API.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: contract-intelligence-qdrant
    profiles: ["rag"]
    ports:
      - "6333:6333"
    volumes:
      - contract_intelligence_qdrant:/qdrant/storage
    restart: unless-stopped

  # Text-Embeddings-Inference (EMBEDDING_PROVIDER=tei). CPU image shown; for the
  # 8B model use a GPU image + node. Set TEI_MODEL to your served model.
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: contract-intelligence-tei
    profiles: ["rag"]
    command: ["--model-id", "${TEI_MODEL:-BAAI/bge-small-en-v1.5}", "--port", "8080"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Self-hosted answerer (LLM_PROVIDER=sglang). Requires an NVIDIA GPU host;
  # `docker compose --profile gpu up sglang`. Pin the model + tensor-parallel
  # size to your hardware (Qwen 72B BF16 = 2x H100). Not runnable without a GPU.
  sglang:
    image: lmsysorg/sglang:latest
    container_name: contract-intelligence-sglang
    profiles: ["gpu"]
    command: ["python", "-m", "sglang.launch_server",
              "--model-path", "${SGLANG_MODEL_STANDARD:-Qwen/Qwen2.5-7B-Instruct}",
              "--host", "0.0.0.0", "--port", "30000"]
    ports:
      - "30000:30000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped

volumes:
  contract_intelligence_pgdata:
  contract_intelligence_ollama:
  contract_intelligence_qdrant:
